<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 48">
  <defs>

    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="100%" stop-color="#0E0B20"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B4FDE"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>

    <linearGradient id="illetGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C060F0"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>

  </defs>

  <!-- Cadre arrondi -->
  <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#iconBg)"/>
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="10.4"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- B centré dans le cadre — y=34 = baseline pour caps centrés dans 48px -->
  <text
    x="24"
    y="34"
    text-anchor="middle"
    font-family="'Bebas Neue', 'Arial Black', Arial, sans-serif"
    font-size="30"
    fill="#E040FB"
  >B</text>

  <!-- ILLETGAB — même baseline y=34 -->
  <text
    x="54"
    y="34"
    font-family="'Bebas Neue', 'Arial Black', Arial, sans-serif"
    font-size="30"
    letter-spacing="1"
  ><tspan fill="#E040FB">ILLET</tspan><tspan fill="#00E5FF">GAB</tspan></text>

</svg>
