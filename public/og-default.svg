<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Fond principal -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#13132A"/>
    </linearGradient>
    <!-- Gradient violet-rose pour le titre -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="50%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <!-- Glow violet -->
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow cyan -->
    <radialGradient id="glow2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient billet -->
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E040FB" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Glassmorphism card -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grille de points décoratifs -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" fill-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Billet décoratif gauche (grand, flou) -->
  <g transform="rotate(-18, 160, 315)" opacity="0.18">
    <rect x="40" y="180" width="240" height="115" rx="14" fill="url(#ticketGrad)" stroke="#7B2FBE" stroke-width="1.5"/>
    <circle cx="40" cy="237" r="14" fill="#0D0D1A"/>
    <circle cx="280" cy="237" r="14" fill="#0D0D1A"/>
    <line x1="54" y1="237" x2="266" y2="237" stroke="#7B2FBE" stroke-width="1" stroke-dasharray="6 4"/>
  </g>

  <!-- Billet décoratif droit (petit) -->
  <g transform="rotate(12, 1050, 200)" opacity="0.14">
    <rect x="950" y="130" width="180" height="86" rx="10" fill="url(#ticketGrad)" stroke="#E040FB" stroke-width="1.5"/>
    <circle cx="950" cy="173" r="11" fill="#0D0D1A"/>
    <circle cx="1130" cy="173" r="11" fill="#0D0D1A"/>
    <line x1="961" y1="173" x2="1119" y2="173" stroke="#E040FB" stroke-width="1" stroke-dasharray="5 3"/>
  </g>

  <!-- Cercle lumineux derrière le logo -->
  <circle cx="600" cy="280" r="180" fill="#7B2FBE" fill-opacity="0.07"/>
  <circle cx="600" cy="280" r="140" fill="#7B2FBE" fill-opacity="0.05"/>

  <!-- Icône ticket central -->
  <g transform="translate(520, 140)">
    <!-- Corps du billet -->
    <rect x="0" y="0" width="160" height="76" rx="10" fill="none" stroke="url(#titleGrad)" stroke-width="2" opacity="0.6"/>
    <!-- Encoche gauche/droite -->
    <circle cx="0" cy="38" r="10" fill="#0D0D1A" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.6"/>
    <circle cx="160" cy="38" r="10" fill="#0D0D1A" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.6"/>
    <!-- Tiret -->
    <line x1="14" y1="38" x2="146" y2="38" stroke="url(#titleGrad)" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.5"/>
    <!-- QR code simulé -->
    <rect x="18" y="10" width="22" height="22" rx="3" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
    <rect x="22" y="14" width="5" height="5" fill="#00E5FF" opacity="0.7"/>
    <rect x="29" y="14" width="5" height="5" fill="#00E5FF" opacity="0.5"/>
    <rect x="22" y="21" width="5" height="5" fill="#00E5FF" opacity="0.5"/>
    <rect x="29" y="21" width="5" height="5" fill="#00E5FF" opacity="0.7"/>
    <!-- Lignes de texte simulées -->
    <rect x="52" y="14" width="70" height="5" rx="2.5" fill="white" opacity="0.2"/>
    <rect x="52" y="24" width="50" height="4" rx="2" fill="white" opacity="0.12"/>
  </g>

  <!-- Titre BilletGo -->
  <text
    x="600"
    y="300"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="110"
    font-weight="900"
    letter-spacing="6"
    fill="url(#titleGrad)"
  >BILLETGO</text>

  <!-- Ligne séparatrice -->
  <line x1="380" y1="325" x2="820" y2="325" stroke="url(#titleGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text
    x="600"
    y="368"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="4"
    fill="white"
    fill-opacity="0.55"
  >LA BILLETTERIE DU GABON</text>

  <!-- Pills de paiement -->
  <g transform="translate(600, 430)">
    <!-- Airtel -->
    <rect x="-175" y="-22" width="155" height="42" rx="21" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="-152" cy="-1" r="12" fill="#E53935" fill-opacity="0.8"/>
    <text x="-132" y="4" font-family="Arial" font-size="13" font-weight="600" fill="white" fill-opacity="0.7">Airtel Money</text>

    <!-- Moov -->
    <rect x="20" y="-22" width="155" height="42" rx="21" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="43" cy="-1" r="12" fill="#1E88E5" fill-opacity="0.8"/>
    <text x="63" y="4" font-family="Arial" font-size="13" font-weight="600" fill="white" fill-opacity="0.7">Moov Money</text>
  </g>

  <!-- URL en bas -->
  <text
    x="600"
    y="570"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="18"
    fill="#7B2FBE"
    fill-opacity="0.8"
    letter-spacing="2"
  >billetgo.ga</text>

  <!-- Badge certifié -->
  <g transform="translate(600, 505)">
    <rect x="-80" y="-16" width="160" height="32" rx="16" fill="#7B2FBE" fill-opacity="0.15" stroke="#7B2FBE" stroke-opacity="0.4" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" font-weight="600" fill="#E040FB" letter-spacing="1.5">PAIEMENT SECURISE</text>
  </g>
</svg>
