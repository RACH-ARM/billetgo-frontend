<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>

    <!-- Background gradient: dark violet -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0D0B1F"/>
      <stop offset="100%" stop-color="#160D2E"/>
    </linearGradient>

    <!-- Ticket gradient: violet → rose -->
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Outer rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border glow -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        fill="none" stroke="rgba(123,47,190,0.4)" stroke-width="1"/>

  <!-- ── Ticket body ── -->
  <!-- Main rectangle with gradient -->
  <rect x="3" y="8" width="26" height="16" rx="2.5" fill="url(#tg)" filter="url(#glow)"/>

  <!-- Left semi-circle notch (dark punches through the ticket) -->
  <circle cx="3" cy="16" r="2.8" fill="#0D0B1F"/>

  <!-- Right semi-circle notch -->
  <circle cx="29" cy="16" r="2.8" fill="#0D0B1F"/>

  <!-- Tear / perforation line (vertical dashed) -->
  <line x1="16" y1="9.5" x2="16" y2="22.5"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.7"
        stroke-dasharray="1.4,1.4" stroke-linecap="round"/>

  <!-- ── Letters ── -->
  <!-- "B" on the left stub -->
  <text
    x="9.5" y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="9.5"
    fill="white"
    opacity="0.95"
  >B</text>

  <!-- "G" on the right stub -->
  <text
    x="22.5" y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="9.5"
    fill="white"
    opacity="0.95"
  >G</text>

</svg>
