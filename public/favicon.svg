<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="100%" stop-color="#0E0B20"/>
    </linearGradient>

    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B4FDE"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>

  </defs>

  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Bordure dégradée -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.4"
        fill="none" stroke="url(#border)" stroke-width="1.5" opacity="0.8"/>

  <!-- B outline net -->
  <text
    x="16" y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="21"
    fill="none"
    stroke="#E040FB"
    stroke-width="1.5"
    stroke-linejoin="round"
    paint-order="stroke"
  >B</text>

</svg>
